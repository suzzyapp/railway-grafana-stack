apiVersion: 1

policies:
  - orgId: 1
    receiver: discord-alerts
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts - notify faster, repeat more often
      - receiver: discord-alerts
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 15m
        continue: false
      # Warning alerts - batched
      - receiver: discord-alerts
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 6h
        continue: false
